name: Deploy Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "hf_space/**"
      - ".github/workflows/deploy-hf-space.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hugging Face client
        run: pip install --upgrade huggingface_hub

      - name: Upload Space files
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN")
          if not token:
              raise SystemExit("Missing GitHub Actions secret: HF_TOKEN")

          HfApi(token=token).upload_folder(
              repo_id="Profrandom/comptext",
              repo_type="space",
              folder_path="hf_space",
              commit_message="Deploy CompText Prompt Compression Lab from GitHub",
          )
          PY
